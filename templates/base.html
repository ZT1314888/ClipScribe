<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}短视频文案系统{% endblock %}</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
           margin: 0; background: #f6f7f9; color: #1f2329; }
    header { background: #fff; border-bottom: 1px solid #e5e6eb; padding: 12px 24px;
             display: flex; align-items: center; gap: 20px; }
    header a { color: #1f2329; text-decoration: none; font-size: 14px; }
    header a:hover { color: #165dff; }
    header .brand { font-weight: 600; font-size: 16px; }
    header .spacer { flex: 1; }
    main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e5e6eb; border-radius: 8px;
            padding: 20px; margin-bottom: 16px; }
    .btn { background: #165dff; color: #fff; border: none; border-radius: 6px;
           padding: 8px 16px; cursor: pointer; font-size: 14px; }
    .btn.secondary { background: #f2f3f5; color: #1f2329; }
    .btn:hover { opacity: .9; }
    input[type=text], input[type=password], textarea, select {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid #d7d9de; border-radius: 6px; font-size: 14px; }
    textarea { min-height: 120px; font-family: inherit; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #eee; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 10px;
           font-size: 12px; background: #f2f3f5; }
    .tag.completed { background: #e8ffea; color: #00b42a; }
    .tag.failed { background: #ffece8; color: #f53f3f; }
    .muted { color: #86909c; font-size: 13px; }
    .notice { background: #fff7e8; border: 1px solid #ffe4ba; padding: 8px 12px;
              border-radius: 6px; font-size: 13px; color: #b25e09; margin-bottom: 12px; }
  </style>
</head>
<body>
  {% if request.url.path != '/login' %}
  <header>
    <span class="brand">📝 短视频文案系统</span>
    <a href="/">提交</a>
    <a href="/tasks">任务列表</a>
    <a href="/stats">统计</a>
    <span class="spacer"></span>
    <a href="/logout">退出</a>
  </header>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
