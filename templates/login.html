{% extends "base.html" %}
{% block title %}登录 · 短视频文案系统{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 60px auto;">
  <h2>团队登录</h2>
  <p class="muted">请输入团队共享口令。仅供内部创作参考使用。</p>
  {% if error %}<div class="notice">口令错误，请重试。</div>{% endif %}
  <form method="post" action="/login">
    <p><input type="password" name="passphrase" placeholder="共享口令" autofocus /></p>
    <button class="btn" type="submit">登录</button>
  </form>
</div>
{% endblock %}
